#Location: ~/.config/starship.toml
#What_is_starship: https://starship.rs/

add_newline = true
command_timeout = 2000

format = """$os$username$hostname$kubernetes$directory$python$git_branch$git_status$character
"""
right_format = "$status"

[character]
success_symbol = """[о‚¶](fg:green)[оЄІ](fg:black bg:green)[о‚ґ](fg:green)
[в•°вЋЇп„…]( bold)"""
error_symbol = """[о‚¶](fg:red)[пЂЌ](fg:white bg:red)[о‚ґ](fg:red)
[в•°вЋЇп„…](red)"""
# в•­в•ґ в•°в”Ђ

#warp-Drop ugly default prompt characters
#success_symbol = ""
#error_symbol = ""

# ---

[os]
format = '[в•­о‚¶](fg:white)[>](fg:black bg:white)'   
disabled = false

[os.symbols]
Windows = 'Win'
Arch = 'Arch'
Ubuntu = 'Ubuntu'
Macos = 'MacOS'
Unknown = '?'

# ---y

# Shows the username
[username]
style_user = 'green'
style_root = 'yellow'
format = '[о‚ґ](fg:white bg:green)[ $user](bg:green bold fg:black)' # 2883ff
disabled = false
show_always = true

# Shows the hostname
[hostname]
ssh_only = false
format = '[о‚ґ](fg:green bg:black bold)[ $hostname](fg:green bg:black bold)'
disabled = false

# Shows current directory
[directory]
truncation_length = 0
truncation_symbol = 'вЂ¦/'
home_symbol = '~'
# read_only_style = '197'
read_only = ' пЂЈ '
format = '[о‚ґ](fg:black)[в”Ђ](fg:black bold)[о‚¶](fg:$style)[$path](fg:blue bg:black bold)[$read_only]($read_only_style)[о‚ґ](fg:black)[в”Ђ](fg:black bold)'
style = '#23271e' # yellow bold 1e2723 BGR COLOR


# Shows current git branch
[git_branch]
disabled = true
# symbol = 'п‡’ '
symbol = 'п‡“ '
format = '[о‚ґ](fg:$style bg:yellow)[ $symbol\[$branch\] ](fg:$style bg:yellow)'
# truncation_length = 0
# truncation_symbol = 'вЂ¦/'
style = '#23271e'

# Shows current git status
[git_status]
disabled = true
format = '[ $all_status $ahead_behind]($style) '
style = 'bold green'
conflicted = 'рџЏі'
up_to_date = ''
untracked = 'п”© '
ahead = 'в‡Ў${count}'
diverged = 'в‡•в‡Ў${ahead_count}в‡Ј${behind_count}'
behind = 'в‡Ј${count}'
stashed = 'пЈ– '
modified = 'пЃ„ '
staged = '[++\($count\)](green)'
renamed = 'иҐЃ '
deleted = 'пЂ” '

# Shows kubernetes context and namespace
[kubernetes]
format = 'via [у±ѓѕ $context\($namespace\)](bold purple) '
disabled = true

# ---

[vagrant]
disabled = true

[docker_context]
disabled = true

[helm]
disabled = true

[python]
symbol = 'у°Њ '
python_binary = ['./venv/bin/python', 'python', 'python3', 'python2']
format = '[о‚¶](fg:blue)[${symbol} ${pyenv_prefix}(${version} )(\($virtualenv\) )](fg:black bg:blue)[о‚ґ](fg:blue)[в”Ђ](fg:black bold)'
style = '#23271e'


[nodejs]
disabled = true

[ruby]
disabled = true

[terraform]
disabled = true
